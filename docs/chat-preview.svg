  <text x="1002" y="366" fill="#B45309" font-family="Arial, sans-serif" font-size="10" font-weight="700">STREAMING LIVE</text>

  <rect x="516" y="392" width="292" height="70" rx="24" fill="#0F172A"/>
  <text x="538" y="417" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">YOU</text>
  <text x="538" y="440" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15">What does the document say about the</text>
  <text x="538" y="461" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15">main business risks and dependencies?</text>

  <rect x="516" y="480" width="560" height="142" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="538" y="505" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">ASSISTANT</text>
  <text x="538" y="530" fill="#0F172A" font-family="Arial, sans-serif" font-size="15">The document highlights three primary risks: revenue concentration,</text>
  <text x="538" y="552" fill="#0F172A" font-family="Arial, sans-serif" font-size="15">supplier dependency, and rising compliance costs. It explains that a</text>
  <text x="538" y="574" fill="#0F172A" font-family="Arial, sans-serif" font-size="15">small number of enterprise accounts contributes a disproportionate</text>
  <text x="538" y="596" fill="#0F172A" font-family="Arial, sans-serif" font-size="15">share of revenue, so losing one could materially affect growth</text>
  <text x="538" y="618" fill="#0F172A" font-family="Arial, sans-serif" font-size="15">targets and near-term operating plans (Quarterly Report.pdf p.7).</text>

  <rect x="538" y="642" width="520" height="14" rx="7" fill="#F8FAFC"/>
  <text x="556" y="652" fill="#64748B" font-family="Arial, sans-serif" font-size="10">Latency: 842 ms</text>
  <text x="673" y="652" fill="#64748B" font-family="Arial, sans-serif" font-size="10">Chat ID: a1b2c3d4...</text>
  <text x="813" y="652" fill="#64748B" font-family="Arial, sans-serif" font-size="10">Receiving tokens...</text>

  <rect x="538" y="631" width="148" height="7" rx="3.5" fill="#E2E8F0"/>
  <rect x="538" y="631" width="104" height="7" rx="3.5" fill="#38BDF8"/>

