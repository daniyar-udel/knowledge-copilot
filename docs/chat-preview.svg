  <text x="190" y="254" fill="#0F172A" font-family="Georgia, serif" font-size="38" font-weight="700">Knowledge Copilot feels production-ready.</text>
  <text x="190" y="281" fill="#475569" font-family="Arial, sans-serif" font-size="16">Streaming answers, grounded sources, feedback capture, and live stats in one demo flow.</text>

  <rect x="884" y="205" width="88" height="58" rx="18" fill="#FEF3C7"/>
  <text x="907" y="224" fill="#B45309" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">DOCS</text>
  <text x="915" y="250" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">12</text>

  <rect x="986" y="205" width="102" height="58" rx="18" fill="#DCFCE7"/>
  <text x="1009" y="224" fill="#15803D" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">INDEXED</text>
  <text x="1027" y="250" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">9</text>

